<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0">
<title>图片展示页面</title>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        padding: 30px;
        background-color: aliceblue;
    }
    h2{
        text-align: center;
        margin-bottom: 30px;
        color: aliceblue;
    }
    .img-box{width: 90%;
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-full,minmax(300px, 1fr));
        gap: 20px;
    }
    .img-box img{width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 8px;
    box-shadow: 0 2px 8px #ccc;}
</style>
</head>
<body>
    <h2>我的图片合集</h2>
    <div class="img-box">
        <img src="https://raw.githubusercontent.com/ljz0823/ljz0823.github.io/main/1.jpg">
         <img src="https://raw.githubusercontent.com/ljz0823/ljz0823.github.io/main/2.jpg">
     <img src="https://raw.githubusercontent.com/ljz0823/ljz0823.github.io/main/3.jpg">
    <img src="https://raw.githubusercontent.com/ljz0823/ljz0823.github.io/main/4.jpg">
     <img src="https://raw.githubusercontent.com/ljz0823/ljz0823.github.io/main/5.jpg">
     <img src="https://raw.githubusercontent.com/ljz0823/ljz0823.github.io/main/6.jpg">
    </div>
</body>
</html>
